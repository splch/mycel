<!doctype html>
<!--
  og.png source. Regenerate after changing this file:

    python3 -m http.server 8619 --directory site &
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --window-size=1200,630 --hide-scrollbars \
      --virtual-time-budget=2000 --screenshot=site/og.png \
      "http://127.0.0.1:8619/og.html"

  1200x630, static by design (no animation): what you see is the card.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background:
      radial-gradient(900px 460px at 82% -12%, #1a2030 0%, transparent 55%),
      linear-gradient(to bottom, #070a10 0%, #0b0e14 30%, #140d08 62%, #0a0705 100%);
    font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
    color: #e9e4d8;
  }
  .moon {
    position: absolute; top: 56px; right: 96px; width: 74px; height: 74px; border-radius: 50%;
    background: radial-gradient(circle at 38% 38%, #f2ead8, #b9b2a2 68%, #8d8779 100%);
    box-shadow: 0 0 60px 18px rgba(226,218,196,.14), 0 0 180px 70px rgba(226,218,196,.05);
  }
  svg.net { position: absolute; inset: 0; }
  .wrap { position: absolute; left: 84px; top: 118px; width: 760px; }
  .kicker { font-size: 20px; letter-spacing: .06em; color: #a49c8f; margin-bottom: 30px; }
  .kicker b { color: #e8a33d; font-weight: 400; }
  h1 { font-family: Georgia, 'Times New Roman', serif; font-weight: 400; font-size: 88px; line-height: 1.04; letter-spacing: -0.5px; }
  .sub { font-family: Georgia, serif; font-style: italic; font-size: 30px; color: #e8a33d; margin-top: 26px; }
  .foot { position: absolute; left: 84px; bottom: 54px; font-size: 19px; color: #6e675d; letter-spacing: .04em; }
  .foot span { color: #7fe0cf; }
</style>
</head>
<body>
  <div class="moon"></div>
  <!-- Every branch departs from a trunk segment ENDPOINT (980,560 / 1015,440),
       so the joints are exactly on-curve by construction. -->
  <svg class="net" viewBox="0 0 1200 630" fill="none" aria-hidden="true">
    <g stroke="#e8a33d" stroke-width="2" stroke-linecap="round" opacity=".85">
      <path d="M990 640 C 984 600, 978 580, 980 560 C 984 520, 1010 480, 1015 440 C 1020 380, 1046 330, 1040 260"/>
      <path d="M980 560 C 920 530, 890 490, 880 430"/>
      <path d="M980 560 C 1050 540, 1090 505, 1105 450"/>
      <path d="M1015 440 C 960 400, 940 350, 932 290"/>
      <path d="M1015 440 C 1075 405, 1100 360, 1108 300"/>
      <path d="M880 430 C 850 390, 842 350, 838 310" opacity=".6"/>
      <path d="M1105 450 C 1150 420, 1170 380, 1176 330" opacity=".6"/>
    </g>
    <g fill="#ffcf7d">
      <circle cx="1040" cy="260" r="7"/>
      <circle cx="932" cy="290" r="5"/>
      <circle cx="1108" cy="300" r="5"/>
      <circle cx="838" cy="310" r="4" fill="#7fe0cf"/>
      <circle cx="1176" cy="330" r="4" fill="#7fe0cf"/>
    </g>
    <g opacity=".5" fill="#ffcf7d">
      <circle cx="1040" cy="260" r="16" opacity=".18"/>
      <circle cx="932" cy="290" r="11" opacity=".16"/>
      <circle cx="1108" cy="300" r="11" opacity=".16"/>
    </g>
  </svg>
  <div class="wrap">
    <p class="kicker"><b>▪</b> mycel · decentralized web search in one Rust binary</p>
    <h1>A search engine you can&nbsp;grow.</h1>
    <p class="sub">Crawl politely. Archive forever. Federate with friends.</p>
  </div>
  <p class="foot">splch.github.io/mycel · <span>no DHT · no tokens · no telemetry</span> · AGPL-3.0</p>
</body>
</html>
