name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Same bar as CI, plus the tag must match Cargo.toml so `mycel --version`
  # can never drift from the release name. Creates the (empty) release once,
  # race-free, before the builds fan out.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - name: tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)"
          if [ "$TAG" != "$VER" ]; then
            echo "tag v$TAG does not match Cargo.toml version $VER" >&2
            exit 1
          fi
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes

  # Native builds only — no cross-compilation (aws-lc-sys makes that painful).
  # Targets are the devices mycel actually serves; Windows and musl are
  # deliberately absent until someone tests/needs them.
  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: package
        run: |
          NAME="mycel-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$NAME"
          cp "target/${{ matrix.target }}/release/mycel" "$NAME/"
          cp README.md "$NAME/"
          tar czf "$NAME.tar.gz" "$NAME"
          if command -v sha256sum >/dev/null; then
            sha256sum "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          else
            shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          fi
      - name: upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" mycel-*.tar.gz mycel-*.tar.gz.sha256 --clobber
